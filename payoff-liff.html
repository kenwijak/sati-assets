  *{box-sizing:border-box;margin:0;padding:0}

  #root{display:flex;flex-direction:column;min-height:100vh;width:100%}
  ::-webkit-scrollbar{width:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes popIn{0%{transform:scale(.75);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .sl-card{position:relative;animation:slideUp .2s cubic-bezier(.34,1.56,.64,1) both}
  .sl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,transparent 100%);border-radius:inherit;pointer-events:none;z-index:0}
  .sl-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(160deg,rgba(255,255,255,.28) 0%,transparent 100%);border-radius:inherit;pointer-events:none;z-index:0}
  .sl-mascot{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
  .sl-tab-btn{transition:all .2s cubic-bezier(.34,1.56,.64,1)}
  input:focus{outline:none}
  button{-webkit-tap-highlight-color:transparent;cursor:pointer}
  .sl-hero{animation:slideUp .25s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes skpulse{0%,100%{opacity:.55}50%{opacity:.2}}
  .sl-ph{border-radius:inherit;animation:skpulse 1.4s ease-in-out infinite}
  .sl-press:active{transform:translateY(2px) scale(.98);transition:transform .07s ease}
  @keyframes coinPop{0%{transform:scale(.35) rotate(-10deg);opacity:0}65%{transform:scale(1.18) rotate(4deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
  .sl-coin{animation:coinPop .5s cubic-bezier(.34,1.56,.64,1) both}
  /* Suppress LIFF SDK injected overlays — any sibling of #root gets hidden */
  body > :not(#root):not(script):not(style){display:none!important;pointer-events:none!important;opacity:0!important}
  [class*="liff-recently"],[class*="liff_recently"],[class*="service-discovery"],
  [class*="liff-browser-helper"],[class*="liff-shortlink"],[class*="liff-tooltip"],
