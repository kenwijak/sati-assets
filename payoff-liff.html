<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Salung 🪙</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#d0d0d0;font-family:'Nunito',sans-serif}
  #root{display:flex;flex-direction:column;align-items:center;padding:16px 0;min-height:100vh}
  ::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;


const G="#3DDB5A",GOLD="#FFD015",CREAM="#F5F0E8",DARK="#1A3D1F",MID="#2D5A35";

const TABS=[
  {id:"cashflow",icon:"💸",label:"Cash Flow",thai:"รายรับ-จ่าย"},
  {id:"save",    icon:"🌱",label:"Save",      thai:"เงินออม"},
  {id:"debt",    icon:"🔓",label:"Debt",       thai:"หนี้"},
  {id:"goal",    icon:"🎯",label:"Goals",      thai:"เป้าหมาย"},
  {id:"more",    icon:"⚙️",label:"More",       thai:"เพิ่มเติม"},
];

const CATS=[
  {id:"food",    icon:"🍚",label:"อาหาร"},
  {id:"travel",  icon:"🚗",label:"เดินทาง"},
  {id:"shop",    icon:"🛒",label:"ช้อปปิ้ง"},
  {id:"entertain",icon:"🎬",label:"บันเทิง"},
  {id:"health",  icon:"💊",label:"สุขภาพ"},
  {id:"bill",    icon:"📋",label:"บิล/ยูทิลิตี้"},
  {id:"income",  icon:"💰",label:"รายรับ"},
  {id:"other",   icon:"📦",label:"อื่นๆ"},
];

// ── primitives ────────────────────────────────────────────────────────────────
function Face({size=40,mood="happy"}){
  return <div style={{width:size,height:size,background:G,borderRadius:"50%",
    border:`2.5px solid ${DARK}`,display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*.44,boxShadow:`2px 2px 0 ${DARK}`,flexShrink:0}}>
    {{happy:"😊",excited:"🤩",thinking:"🤔",proud:"😎",cheer:"🥳",tip:"💡"}[mood]}
  </div>;
}
function Card({children,style={},onClick}){
  return <div onClick={onClick} style={{background:"#fff",borderRadius:16,border:`2px solid ${DARK}`,
    padding:14,boxShadow:`3px 3px 0 ${DARK}`,marginBottom:10,cursor:onClick?"pointer":"default",...style}}>
    {children}
  </div>;
}
function Tag({children,color=GOLD}){
  return <span style={{background:color,color:DARK,fontSize:10,fontWeight:800,
    padding:"2px 8px",borderRadius:99,border:`1.5px solid ${DARK}`}}>{children}</span>;
}
function Bar({pct,color=G,height=8}){
  return <div style={{height,background:"#eee",borderRadius:99,border:`1.5px solid ${DARK}`,overflow:"hidden"}}>
    <div style={{width:`${Math.min(100,pct)}%`,height:"100%",background:pct>100?"#FF6B6B":color,transition:"width .7s"}}/>
  </div>;
}

// ── Bottom Sheet Modal ────────────────────────────────────────────────────────
function Sheet({open,onClose,children}){
  if(!open)return null;
  return <>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",zIndex:98}}/>
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",
      borderRadius:"20px 20px 0 0",border:`2.5px solid ${DARK}`,
      padding:"20px 18px 32px",zIndex:99,maxHeight:"80%",overflowY:"auto"}}>
      {children}
    </div>
  </>;
}

// ── Success flash ─────────────────────────────────────────────────────────────
function Success({icon,title,sub,onClose,spicy}){
  return <div style={{textAlign:"center",padding:"16px 0"}}>
    <div style={{fontSize:40,marginBottom:10}}>{icon}</div>
    <div style={{fontSize:15,fontWeight:900,color:DARK,marginBottom:6}}>{title}</div>
    <div style={{fontSize:12,color:MID,fontWeight:700,lineHeight:1.6,marginBottom:18}}>{sub}</div>
    <button onClick={onClose} style={{width:"100%",padding:"12px 0",fontSize:13,fontWeight:900,
      background:DARK,color:"#fff",border:`2px solid ${DARK}`,borderRadius:12,
      boxShadow:`2px 2px 0 ${DARK}`,cursor:"pointer"}}>เยี่ยม ปิดได้เลย</button>
  </div>;
}

// ── Input helpers ─────────────────────────────────────────────────────────────
function AmtInput({value,onChange,placeholder="0"}){
  return <div style={{position:"relative",marginBottom:12}}>
    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
      fontSize:14,fontWeight:900,color:"#aaa"}}>฿</span>
    <input type="number" value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder}
      style={{width:"100%",padding:"11px 12px 11px 28px",fontSize:18,fontWeight:800,
        border:`2px solid ${value?DARK:"#ddd"}`,borderRadius:12,outline:"none",color:DARK,
        boxShadow:value?`2px 2px 0 ${DARK}`:"none"}}/>
  </div>;
}
function TextInput({value,onChange,placeholder,label}){
  return <div style={{marginBottom:12}}>
    {label&&<div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:4}}>{label}</div>}
    <input type="text" value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder}
      style={{width:"100%",padding:"10px 12px",fontSize:13,fontWeight:700,
        border:`2px solid ${value?DARK:"#ddd"}`,borderRadius:12,outline:"none",color:DARK}}/>
  </div>;
}
function ConfirmBtn({label,disabled,onClick}){
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px 0",
    fontSize:13,fontWeight:900,background:disabled?"#eee":DARK,color:disabled?"#aaa":"#fff",
    border:`2px solid ${disabled?"#ddd":DARK}`,borderRadius:12,
    boxShadow:disabled?"none":`2px 2px 0 ${DARK}`,cursor:disabled?"default":"pointer"}}>
    {label}
  </button>;
}

// ── NBA card ──────────────────────────────────────────────────────────────────
function NBA({text,actionLabel,onAction,spicy,mood="tip"}){
  const [done,setDone]=useState(false);
  if(done)return <Card style={{background:spicy?"#1a3a1a":`${G}18`,marginBottom:10}}>
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      <span style={{fontSize:20}}>✅</span>
      <span style={{fontSize:12,fontWeight:700,color:MID}}>รับทราบแล้ว! Salung จะติดตามให้นะ 🪙</span>
    </div>
  </Card>;
  return <Card style={{background:spicy?"#0d2a10":`${G}12`,border:`2px solid ${spicy?G:MID}`,marginBottom:10}}>
    <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:onAction?10:0}}>
      <Face size={34} mood={mood}/>
      <div style={{flex:1}}>
        <div style={{fontSize:10,fontWeight:800,color:spicy?G:MID,marginBottom:3,letterSpacing:".04em"}}>✦ NEXT BEST ACTION</div>
        <div style={{fontSize:12,fontWeight:700,color:spicy?"#ddd":DARK,lineHeight:1.55}}>{text}</div>
      </div>
    </div>
    {onAction&&<div style={{display:"flex",gap:8}}>
      <button onClick={onAction} style={{flex:1,padding:"8px 0",background:spicy?G:DARK,
        color:spicy?DARK:"#fff",fontWeight:900,fontSize:12,border:`2px solid ${DARK}`,
        borderRadius:10,cursor:"pointer",boxShadow:`2px 2px 0 ${DARK}`}}>{actionLabel}</button>
      <button onClick={()=>setDone(true)} style={{padding:"8px 14px",background:"transparent",
        fontWeight:700,fontSize:11,border:`2px solid #ccc`,borderRadius:10,cursor:"pointer",color:"#aaa"}}>ข้าม</button>
    </div>}
  </Card>;
}

// ══════════════════════════════════════════════════════════════════════════════
// CASH FLOW
// ══════════════════════════════════════════════════════════════════════════════
function CashFlow({spicy,apiPost,userId}){
  const [period,setPeriod]=useState("month");
  const [view,setView]=useState("summary");
  const [monthOffset,setMonthOffset]=useState(0);
  const [sheet,setSheet]=useState(false);
  const [done,setDone]=useState(null); // {amt,cat,note}

  // form state
  const [amt,setAmt]=useState("");
  const [cat,setCat]=useState("food");
  const [note,setNote]=useState("");
  const [type,setType]=useState("expense"); // expense | income

  const MONTHS=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const now=new Date();
  const disp=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
  const monthLabel=`${MONTHS[disp.getMonth()]} ${disp.getFullYear()+543}`;
  const isCurrent=monthOffset===0;

  const PDATA={
    day:{exp:680,inc:0,net:253,netLabel:"งบวันนี้เหลือ"},
    week:{exp:3840,inc:0,net:-240,netLabel:"เทียบงบ 7 วัน"},
    month:{
      exp:monthOffset===0?11600:monthOffset===-1?13200:10800,
      inc:28000,net:monthOffset===0?8000:monthOffset===-1?6400:9100,
      netLabel:"ใช้จ่ายได้จริง",
    },
  };
  const d=PDATA[period];

  const alloc=[
    {label:"รายรับ",         amt:28000,color:G,        icon:"💰"},
    {label:"ผ่อนหนี้",        amt:-5000,color:"#FF6B6B",icon:"🔓"},
    {label:"ออมเงิน",          amt:-8000,color:"#4ECDC4",icon:"🌱"},
    {label:"ค่าคงที่",        amt:-7000,color:GOLD,     icon:"📋"},
  ];
  const cats=[
    {label:"อาหาร",  val:{day:420,week:1890,month:4200}[period],color:"#FF6B6B",max:{day:167,week:1167,month:5000}[period]},
    {label:"เดินทาง",val:{day:260,week:980, month:2100}[period],color:"#4ECDC4",max:{day:100,week:700, month:3000}[period]},
    {label:"ช้อปปิ้ง",val:{day:0,  week:650, month:3800}[period],color:G,        max:{day:0,  week:700, month:3000}[period]},
    {label:"บันเทิง", val:{day:0,  week:320, month:1500}[period],color:GOLD,     max:{day:0,  week:467, month:2000}[period]},
  ].filter(c=>c.val>0);

  const txns=[
    {cat:"🍚",note:"ข้าวกลางวัน",   amt:-120, time:"12:34"},
    {cat:"🚗",note:"Grab ไปออฟฟิศ", amt:-130, time:"08:15"},
    {cat:"💰",note:"เงินเดือน",      amt:28000,time:"1 มิ.ย."},
    {cat:"🏠",note:"ค่าเช่า",         amt:-6500,time:"1 มิ.ย."},
    {cat:"👗",note:"ซื้อเสื้อ Uniqlo",amt:-1290,time:"28 พ.ค."},
  ];

  const nba={
    day:"วันนี้เหลืองบ ฿253 อีก 1 มื้อเย็น = รอด ไม่ต้องสั่ง delivery นะ",
    week:spicy?"สัปดาห์นี้ช้อปปิ้ง ฿650 เกินงบ Salung เห็นหมดนะ 👀":"สัปดาห์นี้ช้อปปิ้งเกินงบ ฿650 ลองพักก่อน 1 อาทิตย์ได้ไหม?",
    month:spicy?"฿3,800 ในช้อปปิ้ง Salung เห็นหมดนะ 👀":"เดือนนี้ช้อปปิ้งเกินงบ ฿800 ถ้าโยนเข้าหนี้บัตรได้จะปิดเร็วขึ้น 1 เดือนนะ",
  };

  const [loading,setLoading]=useState(false);
  const [apiErr,setApiErr]=useState("");

  async function submit(){
    if(!userId||!amt||Number(amt)<=0)return;
    setLoading(true);setApiErr("");
    try{
      const data=await apiPost("/liff/transaction",{
        amount_thb:Number(amt),
        category_id:type==="income"?"income":cat,
        note,type,
      });
      if(!data.ok)throw new Error(data.error||"บันทึกไม่ได้");
      setDone({amt:Number(amt),cat,note,type});
      setAmt("");setNote("");setCat("food");setType("expense");
    }catch(e){setApiErr(e.message);}
    finally{setLoading(false);}
  }

  return <div style={{position:"relative"}}>
    <Sheet open={sheet} onClose={()=>{setSheet(false);setDone(null);}}>
      {done ? <Success icon={done.cat==="income"?"💰":"✅"}
        title={`บันทึกแล้ว ${done.type==="income"?"+":"-"}฿${done.amt.toLocaleString()}`}
        sub={spicy?"Salung บันทึกไว้ให้แล้วนะ — ข้อมูลอัปเดตแล้ว":"บันทึกเรียบร้อย ข้อมูลอัปเดตทันทีนะ 🌱"}
        onClose={()=>{setSheet(false);setDone(null);}}/> :
      <>
        <div style={{fontSize:14,fontWeight:900,color:DARK,marginBottom:14}}>+ บันทึกรายการ</div>

        {/* income / expense toggle */}
        <div style={{display:"flex",border:`2px solid ${DARK}`,borderRadius:12,overflow:"hidden",marginBottom:14}}>
          {[["expense","รายจ่าย"],["income","รายรับ"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setType(id)} style={{flex:1,padding:"9px 0",fontSize:12,fontWeight:800,
              border:"none",cursor:"pointer",
              background:type===id?DARK:"#fff",color:type===id?"#fff":"#888"}}>{lbl}</button>
          ))}
        </div>

        <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:6}}>จำนวน</div>
        <AmtInput value={amt} onChange={setAmt}/>

        {type==="expense"&&<>
          <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:8}}>หมวด</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
            {CATS.filter(c=>c.id!=="income").map(c=>(
              <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:"8px 0",
                background:cat===c.id?DARK:"#f5f5f5",
                color:cat===c.id?"#fff":DARK,
                border:`2px solid ${cat===c.id?DARK:"#ddd"}`,
                borderRadius:10,cursor:"pointer",fontSize:11,fontWeight:800,
                boxShadow:cat===c.id?`2px 2px 0 ${DARK}`:"none"}}>
                <div style={{fontSize:16,marginBottom:2}}>{c.icon}</div>
                {c.label}
              </button>
            ))}
          </div>
        </>}

        <TextInput value={note} onChange={setNote} label="โน้ต (ไม่บังคับ)" placeholder="เช่น กาแฟ, Grab, เงินเดือน"/>
        {apiErr&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF0F0",borderRadius:10,fontSize:11,fontWeight:700,color:"#E53E3E"}}>{apiErr}</div>}
        <ConfirmBtn label={loading?"กำลังบันทึก...":(`บันทึก${type==="income"?"รายรับ":"รายจ่าย"}`)} disabled={!amt||Number(amt)<=0||loading} onClick={submit}/>
      </>}
    </Sheet>

    <NBA text={nba[period]} actionLabel="+ บันทึกรายการ" onAction={()=>setSheet(true)} spicy={spicy}
      mood={period==="month"?"thinking":"tip"}/>

    {/* Period toggle */}
    <div style={{display:"flex",gap:6,marginBottom:10}}>
      {[["day","วันนี้"],["week","7 วัน"],["month","เดือน"]].map(([id,lbl])=>(
        <button key={id} onClick={()=>setPeriod(id)} style={{flex:1,padding:"8px 0",fontSize:12,
          fontWeight:800,cursor:"pointer",borderRadius:10,border:`2px solid ${DARK}`,transition:"all .15s",
          background:period===id?(spicy?G:DARK):(spicy?"#222":"#fff"),
          color:period===id?(spicy?DARK:"#fff"):(spicy?"#aaa":DARK),
          boxShadow:period===id?`2px 2px 0 ${DARK}`:"none"}}>{lbl}</button>
      ))}
    </div>

    {/* Month nav */}
    {period==="month"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
      <button onClick={()=>setMonthOffset(o=>o-1)} style={{width:32,height:32,borderRadius:10,
        border:`2px solid ${DARK}`,background:spicy?"#222":"#fff",cursor:"pointer",
        fontSize:14,boxShadow:`2px 2px 0 ${DARK}`,fontWeight:900,color:DARK}}>‹</button>
      <div style={{fontSize:13,fontWeight:900,color:spicy?G:DARK}}>
        {monthLabel} {isCurrent&&<span style={{fontSize:10,color:"#aaa",fontWeight:600}}>(ปัจจุบัน)</span>}
      </div>
      <button onClick={()=>setMonthOffset(o=>Math.min(0,o+1))} disabled={isCurrent}
        style={{width:32,height:32,borderRadius:10,
          border:`2px solid ${isCurrent?"#ddd":DARK}`,
          background:isCurrent?"#f5f5f5":(spicy?"#222":"#fff"),
          cursor:isCurrent?"default":"pointer",fontSize:14,
          boxShadow:isCurrent?"none":`2px 2px 0 ${DARK}`,
          fontWeight:900,color:isCurrent?"#ccc":DARK}}>›</button>
    </div>}

    {/* Summary */}
    {period==="month"?
      <Card style={{background:spicy?DARK:CREAM}}>
        <div style={{fontSize:12,fontWeight:900,color:spicy?G:DARK,marginBottom:12}}>💰 เงินเดือนนี้ไปไหนบ้าง?</div>
        {alloc.map((row,i)=>(
          <div key={i} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:13}}>{row.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:spicy?"#ccc":DARK}}>{row.label}</span>
              </div>
              <span style={{fontSize:12,fontWeight:900,color:row.amt>0?G:(spicy?"#FF9999":"#E53E3E")}}>
                {row.amt>0?"+":"-"}฿{Math.abs(row.amt).toLocaleString()}
              </span>
            </div>
            <Bar pct={(Math.abs(row.amt)/28000)*100} color={row.color}/>
          </div>
        ))}
        <div style={{borderTop:`2px dashed ${spicy?"#444":"#ccc"}`,marginTop:10,paddingTop:10,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:spicy?"#aaa":"#666"}}>💸 ใช้จ่ายได้จริง</div>
            <div style={{fontSize:10,color:"#aaa"}}>ใช้แล้ว ฿4,600 · เหลือ ฿3,400</div>
          </div>
          <div style={{fontSize:22,fontWeight:900,color:spicy?G:DARK}}>฿8,000</div>
        </div>
        <Bar pct={(4600/8000)*100} color={G} height={10}/>
      </Card>:
      <Card style={{background:spicy?DARK:CREAM}}>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1,background:spicy?"#222":"#fff",borderRadius:12,border:`2px solid ${DARK}`,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#888",fontWeight:600}}>รายจ่าย</div>
            <div style={{fontSize:16,fontWeight:900,color:spicy?"#FF9999":"#E53E3E"}}>-฿{d.exp.toLocaleString()}</div>
          </div>
          <div style={{flex:1,background:d.net>=0?(spicy?"#1a3a1a":`${G}22`):"#FFF0F0",
            borderRadius:12,border:`2px solid ${DARK}`,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#888",fontWeight:600}}>{d.netLabel}</div>
            <div style={{fontSize:16,fontWeight:900,color:d.net>=0?(spicy?G:MID):"#E53E3E"}}>
              {d.net>=0?"+":""}฿{d.net.toLocaleString()}
            </div>
          </div>
        </div>
      </Card>
    }

    {/* Sub-tab */}
    <div style={{display:"flex",border:`2px solid ${DARK}`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
      {[["summary","📊 สรุป"],["transactions","📋 รายการ"]].map(([id,lbl])=>(
        <button key={id} onClick={()=>setView(id)} style={{flex:1,padding:"9px 0",fontSize:12,
          fontWeight:800,border:"none",cursor:"pointer",transition:"all .15s",
          background:view===id?(spicy?G:DARK):(spicy?"#222":"#fff"),
          color:view===id?(spicy?DARK:"#fff"):(spicy?"#aaa":"#888")}}>{lbl}</button>
      ))}
    </div>

    {view==="summary"?
      <Card>
        <div style={{fontSize:12,fontWeight:800,color:DARK,marginBottom:10}}>รายจ่ายแยกหมวด</div>
        {cats.map(c=>(
          <div key={c.label} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:12,fontWeight:700}}>{c.label}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {(c.val/c.max)>1&&<Tag color="#FF6B6B">เกินงบ</Tag>}
                <span style={{fontSize:12,fontWeight:800}}>฿{c.val.toLocaleString()}</span>
              </div>
            </div>
            <Bar pct={(c.val/c.max)*100} color={c.color}/>
            {(c.val/c.max)>1&&<div style={{fontSize:10,color:"#FF6B6B",fontWeight:700,marginTop:2}}>
              {spicy?"งบแตกแล้วจ้า ของในบ้านน่าจะพอใช้ได้อีกสักพัก":"เกินงบแล้วนะ เดือนหน้าตั้งต้นใหม่ได้เลย"}
            </div>}
          </div>
        ))}
      </Card>:
      <Card style={{padding:"12px 12px 6px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:800,color:DARK}}>รายการ</span>

// SAVE
// ══════════════════════════════════════════════════════════════════════════════
function Save({spicy,apiPost,userId}){
  const [sheet,setSheet]=useState(false);
  const [done,setDone]=useState(null);
  const [amt,setAmt]=useState("");
  const [dest,setDest]=useState("emergency");
  const [saveNote,setSaveNote]=useState("");
  const [investToast,setInvestToast]=useState(false);

  const [loading,setLoading]=useState(false);
  const [apiErr,setApiErr]=useState("");

  async function submit(){
    if(!userId||!amt||Number(amt)<=0)return;
    setLoading(true);setApiErr("");
    try{
      const data=await apiPost("/liff/saving",{
        amount_thb:Number(amt),destination:dest,note:saveNote,
      });
      if(!data.ok)throw new Error(data.error||"บันทึกไม่ได้");
      setDone({amt:Number(amt),dest});
      setAmt("");setDest("emergency");setSaveNote("");
    }catch(e){setApiErr(e.message);}
    finally{setLoading(false);}
  }

  const destOpts=[
    {id:"emergency",label:"กองทุนฉุกเฉิน",icon:"🛡️"},
    {id:"general",  label:"ออมทั่วไป",    icon:"🌱"},
    {id:"goal",     label:"เป้าหมาย",     icon:"🎯"},

  return <div style={{position:"relative"}}>
    {investToast&&<>
      <div onClick={()=>setInvestToast(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:998}}/>
      <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",

        padding:"20px 18px",zIndex:999,width:260,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>⛓️</div>
        <div style={{fontSize:14,fontWeight:900,color:GOLD,marginBottom:6}}>ฟีเจอร์นี้กำลังมา</div>
        <div style={{fontSize:12,color:"#ccc",lineHeight:1.6,marginBottom:14}}>
          การดึงข้อมูลพอร์ตลงทุน real-time อยู่ใน roadmap — ตอนนี้บันทึกตัวเลขเองผ่านแชทได้เลย
        </div>
        <button onClick={()=>setInvestToast(false)} style={{background:GOLD,color:DARK,
          border:`2px solid ${DARK}`,borderRadius:10,padding:"8px 24px",fontWeight:900,
          fontSize:13,cursor:"pointer"}}>โอเค รับทราบ</button>
      </div>
    </>}

    <Sheet open={sheet} onClose={()=>{setSheet(false);setDone(null);}}>
      {done?<Success icon="🌱" title={`ออมไปแล้ว ฿${done.amt.toLocaleString()}`}
        sub={spicy?"บันทึกแล้ว สลึงเล็กๆ กำลังรวมเป็นก้อนใหญ่":"สลึงเล็กๆ กำลังรวมเป็นก้อนใหญ่เลย 🪙"}
        onClose={()=>{setSheet(false);setDone(null);}}/>:
      <>
        <div style={{fontSize:14,fontWeight:900,color:DARK,marginBottom:14}}>+ บันทึกเงินออม</div>
        <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:6}}>จำนวนที่ออม</div>
        <AmtInput value={amt} onChange={setAmt}/>
        <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:8}}>ออมไปที่ไหน</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {destOpts.map(o=>(
            <button key={o.id} onClick={()=>setDest(o.id)} style={{flex:1,padding:"10px 0",
              background:dest===o.id?DARK:"#f5f5f5",color:dest===o.id?"#fff":DARK,

        <TextInput value={saveNote} onChange={setSaveNote} label="โน้ต (ไม่บังคับ)" placeholder="เช่น โบนัส, เงินเหลือเดือนนี้"/>
        {apiErr&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF0F0",borderRadius:10,fontSize:11,fontWeight:700,color:"#E53E3E"}}>{apiErr}</div>}

      </div>
    </Card>

    <Card>
      <div style={{fontSize:12,fontWeight:800,color:DARK,marginBottom:10}}>กองทุนฉุกเฉิน</div>
      <div style={{background:`${G}12`,borderRadius:12,padding:12,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:12,fontWeight:700}}>มีอยู่</span>
          <span style={{fontSize:13,fontWeight:900,color:MID}}>฿42,000</span>
        </div>
        <Bar pct={42}/>
        <div style={{fontSize:10,color:"#888",marginTop:4}}>42% ของเป้า 3 เดือน (฿100k)</div>

function Debt({spicy,apiPost,userId}){
  const [showPlan,setShowPlan]=useState(false);
  const [payModal,setPayModal]=useState(null);
  const [payAmt,setPayAmt]=useState("");
  const [paidDone,setPaidDone]=useState({});

  const debts=[
    {name:"บัตรเครดิต KBank",bal:28000,rate:18,min:800, color:"#FF6B6B",priority:true},
    {name:"สินเชื่อส่วนบุคคล", bal:45000,rate:12,min:1500,color:GOLD,      priority:false},
    {name:"ผ่อนมือถือ 0%",     bal:8400, rate:0, min:700, color:"#4ECDC4",  priority:false},
  ];
  const total=debts.reduce((s,d)=>s+d.bal,0);
  const timeline=[
    {name:"บัตรเครดิต KBank",months:14,freeDate:"ส.ค. 2027",color:"#FF6B6B"},
    {name:"สินเชื่อส่วนบุคคล", months:28,freeDate:"ต.ค. 2028",color:GOLD},
    {name:"ผ่อนมือถือ 0%",     months:12,freeDate:"มิ.ย. 2027",color:"#4ECDC4"},
  ];
  const freeDate="ต.ค. 2028",monthsLeft=28;

  const [payLoading,setPayLoading]=useState(false);
  const [payApiErr,setPayApiErr]=useState("");

  async function confirmPay(debt){
    if(!userId||!payAmt||Number(payAmt)<=0)return;
    setPayLoading(true);setPayApiErr("");
    try{
      const data=await apiPost("/liff/debt-payment",{
        debt_id:debt.id,amount_thb:Number(payAmt),
      });
      if(!data.ok)throw new Error(data.error||"บันทึกไม่ได้");
      setPaidDone(p=>({...p,[debt.name]:Number(payAmt)}));
      setPayModal({...debt,justPaid:Number(payAmt)});
      setPayAmt("");
    }catch(e){setPayApiErr(e.message);}
    finally{setPayLoading(false);}
  }

  return <div style={{position:"relative"}}>
    {/* Payment sheet */}
    <Sheet open={!!payModal} onClose={()=>{setPayModal(null);setPayAmt("");}}>
      {payModal?.justPaid?
        <Success icon="🔓" title={`จ่ายไปแล้ว ฿${payModal.justPaid.toLocaleString()}`}
          sub={spicy?`ชำระแล้ว ฿${payModal.justPaid.toLocaleString()} บัตรยังไม่ตาย แต่ใกล้ขึ้นแล้ว`
            :"โซ่หลุดไปอีกข้อนะ — ทุกบาทที่จ่ายคือก้าวที่เดินมา 🌱"}
          onClose={()=>setPayModal(null)}/>:
        payModal&&<>
          <div style={{fontSize:14,fontWeight:900,color:DARK,marginBottom:2}}>ชำระหนี้งวดนี้</div>
          <div style={{fontSize:12,color:"#888",marginBottom:14}}>
            {payModal.name} · คงเหลือ ฿{payModal.bal.toLocaleString()}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[payModal.min,payModal.min+500,payModal.min+1000].map(a=>(
              <button key={a} onClick={()=>setPayAmt(String(a))} style={{flex:1,padding:"8px 0",
                fontSize:11,fontWeight:800,cursor:"pointer",borderRadius:10,
                background:payAmt===String(a)?DARK:"#f5f5f5",
                color:payAmt===String(a)?"#fff":DARK,
                border:`2px solid ${payAmt===String(a)?DARK:"#ddd"}`,
                boxShadow:payAmt===String(a)?`2px 2px 0 ${DARK}`:"none"}}>
                ฿{a.toLocaleString()}
                {a===payModal.min&&<div style={{fontSize:9,opacity:.7}}>ขั้นต่ำ</div>}
                {a>payModal.min&&<div style={{fontSize:9,color:G}}>+฿{(a-payModal.min).toLocaleString()}</div>}
              </button>
            ))}
          </div>
          <AmtInput value={payAmt} onChange={setPayAmt} placeholder="ใส่จำนวนอื่น"/>
          {payAmt&&Number(payAmt)>payModal.min&&
            <div style={{marginBottom:12,padding:"8px 12px",background:`${G}15`,borderRadius:10,
              fontSize:11,fontWeight:700,color:MID}}>
              จ่ายเพิ่มจากขั้นต่ำ ฿{(Number(payAmt)-payModal.min).toLocaleString()} → ปิดหนี้เร็วขึ้น 🎯
            </div>}
          {payApiErr&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF0F0",borderRadius:10,fontSize:11,fontWeight:700,color:"#E53E3E"}}>{payApiErr}</div>}
          <ConfirmBtn label={payLoading?"กำลังบันทึก...":`ยืนยัน ฿${payAmt?Number(payAmt).toLocaleString():"—"}`}
            disabled={!payAmt||Number(payAmt)<=0||payLoading} onClick={()=>confirmPay(payModal)}/>
        </>}
    </Sheet>

    <NBA mood="thinking" spicy={spicy}
      text={`จ่ายบัตรเครดิตเพิ่ม ฿500/เดือน จะปิดหนี้เร็วขึ้น 8 เดือน\nดอกเบี้ยที่ประหยัดได้ ≈ ฿3,200`}
      actionLabel="ชำระหนี้เลย" onAction={()=>setPayModal(debts[0])}/>

    <Card style={{background:spicy?DARK:"#FFF5F5"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:"#888",fontWeight:600}}>หนี้รวมทั้งหมด</div>
          <div style={{fontSize:24,fontWeight:900,color:"#E53E3E"}}>฿{total.toLocaleString()}</div>
          <div style={{fontSize:11,fontWeight:700,marginTop:2,color:spicy?"#FF9999":"#888"}}>
            {spicy?"฿81,400 ยังอยู่นะ แต่น้อยลงทุกเดือน ดีกว่าเพิ่ม":"ลดลง ฿2,300 จากเดือนที่แล้ว เดินมาถูกทางแล้ว"}
          </div>
        </div>
        <Face size={42} mood="thinking"/>
      </div>

    <Card style={{background:spicy?"#0d1a0d":`${G}10`,border:`2px solid ${spicy?G:MID}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>

          <div style={{fontSize:10,fontWeight:800,color:spicy?G:MID,letterSpacing:".06em",marginBottom:4}}>⛓️ วันปลดแอก (Avalanche)</div>
          <div style={{fontSize:22,fontWeight:900,color:spicy?"#fff":DARK}}>{freeDate}</div>

          <div style={{fontSize:11,fontWeight:700,marginTop:4,color:spicy?G:MID}}>
            {spicy?"28 เดือน แค่นั้นเอง เธอทำได้แน่นอน":"วันที่เงินเดือนออกมาแล้วไม่ต้องแบ่งให้ใครเลย"}
          </div>
        </div>
        <div style={{textAlign:"center",background:spicy?"#1a3a1a":`${G}25`,
          borderRadius:12,padding:"8px 12px",border:`1.5px solid ${MID}`}}>
          <div style={{fontSize:10,color:"#888",fontWeight:600}}>ถ้าจ่ายเพิ่ม ฿500</div>
          <div style={{fontSize:13,fontWeight:900,color:G}}>ก.พ. 2028</div>
          <div style={{fontSize:9,color:G,fontWeight:700}}>เร็วขึ้น 8 เดือน</div>
        </div>
      </div>
      {timeline.map((t,i)=>(
        <div key={i} style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:10,fontWeight:700,color:spicy?"#ccc":DARK}}>{t.name}</span>

        fontWeight:800,background:spicy?G:DARK,color:spicy?DARK:"#fff",

        cursor:"pointer",marginTop:8}}>

      {showPlan&&<div style={{marginTop:12,padding:12,background:spicy?"#111":"#fff",

          style={{width:"100%",marginTop:8,padding:"8px 0",fontSize:12,fontWeight:800,
            background:paidDone[d.name]?"#f5f5f5":`${G}22`,
            color:paidDone[d.name]?"#aaa":MID,
            border:`1.5px solid ${paidDone[d.name]?"#ddd":G}`,
            borderRadius:10,cursor:"pointer"}}>
          {paidDone[d.name]?"✓ ชำระแล้วเดือนนี้":"💸 ชำระหนี้งวดนี้"}
        </button>
      </Card>
    ))}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
// GOALS
// ══════════════════════════════════════════════════════════════════════════════
function Goal({spicy,apiPost,userId}){
  const [addSheet,setAddSheet]=useState(false);
  const [fundSheet,setFundSheet]=useState(null); // goal object
  const [addDone,setAddDone]=useState(null);
  const [fundDone,setFundDone]=useState(null);

  // add goal form
  const [gName,setGName]=useState("");
  const [gTarget,setGTarget]=useState("");
  const [gDeadline,setGDeadline]=useState("");

  // fund form
  const [fAmt,setFAmt]=useState("");

  const [goals,setGoals]=useState([
    {id:1,name:"อิสระทางการเงิน (FI)",icon:"✨",pct:0.8, target:"10,800,000",deadline:"ระยะยาว",color:GOLD,fi:true},
    {id:2,name:"กองทุนฉุกเฉิน 3 เดือน",icon:"🛡️",pct:42,  target:"100,000",  deadline:"ธ.ค. 2026",color:"#4ECDC4",fi:false},
    {id:3,name:"ดาวน์รถ",               icon:"🚗",pct:18,  target:"150,000",  deadline:"มิ.ย. 2027",color:G,fi:false},
  ]);

  const [addLoading,setAddLoading]=useState(false);
  const [addApiErr,setAddApiErr]=useState("");

  async function submitAdd(){
    if(!userId||!gName||!gTarget)return;
    setAddLoading(true);setAddApiErr("");
    try{
      const data=await apiPost("/liff/goal",{
        action:"add",name:gName,target_thb:Number(gTarget),deadline:gDeadline,
      });
      if(!data.ok)throw new Error(data.error||"บันทึกไม่ได้");
      const newGoal={id:data.goal.id,name:gName,icon:"🎯",pct:0,
        target:gTarget,deadline:gDeadline||"ไม่กำหนด",color:G,fi:false};
      setGoals(gs=>[...gs,newGoal]);
      setAddDone(newGoal);
      setGName("");setGTarget("");setGDeadline("");
    }catch(e){setAddApiErr(e.message);}
    finally{setAddLoading(false);}
  }
  const [fundLoading,setFundLoading]=useState(false);
  const [fundApiErr,setFundApiErr]=useState("");

  async function submitFund(){
    if(!userId||!fAmt||Number(fAmt)<=0)return;
    setFundLoading(true);setFundApiErr("");
    try{
      const data=await apiPost("/liff/goal",{
        action:"fund",goal_id:fundSheet.id,amount_thb:Number(fAmt),
      });
      if(!data.ok)throw new Error(data.error||"บันทึกไม่ได้");
      setGoals(gs=>gs.map(g=>g.id===fundSheet.id?{...g,pct:data.pct}:g));
      setFundDone({goal:fundSheet,amt:Number(fAmt)});
      setFAmt("");
    }catch(e){setFundApiErr(e.message);}
    finally{setFundLoading(false);}
  }

  return <div style={{position:"relative"}}>
    {/* Add goal sheet */}
    <Sheet open={addSheet} onClose={()=>{setAddSheet(false);setAddDone(null);}}>
      {addDone?<Success icon="🎯" title={`เพิ่มเป้าหมาย "${addDone.name}" แล้ว!`}
        sub={spicy?"โอเค Salung จะจับตาดูนะ":"เริ่มต้นแล้ว ทุกก้าวเล็กๆ นำไปถึงเป้าหมายนะ 🌱"}
        onClose={()=>{setAddSheet(false);setAddDone(null);}}/>:
      <>
        <div style={{fontSize:14,fontWeight:900,color:DARK,marginBottom:14}}>+ เพิ่มเป้าหมาย</div>
        <TextInput value={gName} onChange={setGName} label="ชื่อเป้าหมาย" placeholder="เช่น ดาวน์บ้าน, เที่ยวญี่ปุ่น, เกษียณ"/>
        <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:6}}>จำนวนเงินเป้าหมาย</div>
        <AmtInput value={gTarget} onChange={setGTarget} placeholder="100,000"/>
        <TextInput value={gDeadline} onChange={setGDeadline} label="กำหนดเวลา (ไม่บังคับ)" placeholder="เช่น ธ.ค. 2027"/>
        {addApiErr&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF0F0",borderRadius:10,fontSize:11,fontWeight:700,color:"#E53E3E"}}>{addApiErr}</div>}
        <ConfirmBtn label={addLoading?"กำลังบันทึก...":"สร้างเป้าหมาย"} disabled={!gName||!gTarget||addLoading} onClick={submitAdd}/>
      </>}
    </Sheet>

    {/* Fund goal sheet */}
    <Sheet open={!!fundSheet} onClose={()=>{setFundSheet(null);setFundDone(null);setFAmt("");}}>
      {fundDone?<Success icon="💰" title={`เพิ่ม ฿${fundDone.amt.toLocaleString()} เข้า "${fundDone.goal.name}"`}
        sub={spicy?"บันทึกแล้ว ใกล้ขึ้นอีกนิด":"เดินหน้าต่อ ทุกบาทนับ 🎯"}
        onClose={()=>{setFundSheet(null);setFundDone(null);}}/>:
        fundSheet&&<>
          <div style={{fontSize:14,fontWeight:900,color:DARK,marginBottom:2}}>เพิ่มเงินเข้าเป้าหมาย</div>
          <div style={{fontSize:12,color:"#888",marginBottom:14}}>
            {fundSheet.icon} {fundSheet.name} · ไปแล้ว {fundSheet.pct}%
          </div>
          <div style={{fontSize:11,fontWeight:800,color:DARK,marginBottom:6}}>จำนวนที่เพิ่ม</div>
          <AmtInput value={fAmt} onChange={setFAmt}/>
          {fundApiErr&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF0F0",borderRadius:10,fontSize:11,fontWeight:700,color:"#E53E3E"}}>{fundApiErr}</div>}
          <ConfirmBtn label={fundLoading?"กำลังบันทึก...":`เพิ่ม ฿${fAmt?Number(fAmt).toLocaleString():"—"} เข้าเป้าหมาย`}
            disabled={!fAmt||Number(fAmt)<=0||fundLoading} onClick={submitFund}/>
        </>}
    </Sheet>

    <NBA mood="cheer" spicy={spicy}
      text="เป้าดาวน์รถช้ากว่าแผน 2 เดือน — เพิ่มเงินออมเดือนละ ฿1,200 จะกลับมาทันแผนได้"
      actionLabel="เพิ่มเงินเข้าเป้า" onAction={()=>setFundSheet(goals[2])}/>

    <Card style={{background:spicy?DARK:`${GOLD}18`,border:`2px solid ${DARK}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>✨</span>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:spicy?G:DARK}}>อิสระทางการเงิน (FI)</div>
            <div style={{fontSize:10,color:"#888"}}>เป้า ฿10,800,000 · ระยะยาว</div>
          </div>
        </div>
        <div style={{fontSize:22,fontWeight:900,color:spicy?G:DARK}}>0.8%</div>
      </div>
      <Bar pct={0.8} color={GOLD} height={10}/>
      <div style={{marginTop:8,fontSize:11,fontWeight:700,color:spicy?G:MID}}>
        {spicy?"ยังไกลมาก แต่เริ่มแล้ว เดินต่อ":"วันที่เงินเดือนออกมาแล้วไม่ต้องแบ่งให้ใครเลย"}
      </div>
    </Card>

    {goals.filter(g=>!g.fi).map((g)=>(
      <Card key={g.id}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>{g.icon}</span>
            <div>
              <div style={{fontSize:12,fontWeight:800,color:DARK}}>{g.name}</div>
              <div style={{fontSize:10,color:"#888"}}>฿{g.target} · {g.deadline}</div>
            </div>
          </div>
          <div style={{width:40,height:40,borderRadius:"50%",
            border:`3px solid ${g.pct>50?G:g.pct>20?GOLD:"#ddd"}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:900,color:DARK,flexShrink:0}}>{g.pct}%</div>
        </div>
        <Bar pct={g.pct} color={g.color}/>
        <button onClick={()=>setFundSheet(g)} style={{width:"100%",marginTop:8,padding:"8px 0",
          fontSize:12,fontWeight:800,background:`${G}22`,color:MID,
          border:`1.5px solid ${G}`,borderRadius:10,cursor:"pointer"}}>
          + เพิ่มเงินเข้าเป้า
        </button>
      </Card>
    ))}

    <button onClick={()=>setAddSheet(true)} style={{position:"fixed",bottom:80,right:20,
      width:52,height:52,borderRadius:"50%",background:spicy?G:DARK,color:spicy?DARK:"#fff",
      border:`2.5px solid ${DARK}`,boxShadow:`3px 3px 0 ${DARK}`,
      fontSize:22,cursor:"pointer",zIndex:50}}>+</button>
  </div>;
}

// MORE
// ══════════════════════════════════════════════════════════════════════════════
function More({spicy,onSpicyConfirm}){
  const items=[
    {icon:"👤",label:"โปรไฟล์ & ความยินยอม"},
    {icon:"🔔",label:"การแจ้งเตือน"},
    {icon:"🌶️",label:"Spicy Mode",action:true},
    {icon:"💎",label:"Premium — ฿79/เดือน"},
    {icon:"📤",label:"แชร์ Salung Card"},
    {icon:"📋",label:"ข้อมูลที่ Salung จำ"},
    {icon:"🗑️",label:"ลบข้อมูลของฉัน"},
  ];
  return <div>
    <Card style={{background:spicy?DARK:CREAM}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Face size={46} mood={spicy?"excited":"happy"}/>
        <div>
          <div style={{fontSize:14,fontWeight:900,color:spicy?G:DARK}}>สวัสดี {liffProfile?.displayName||"นะ"} 👋</div>
          <div style={{fontSize:11,color:"#888"}}>ใช้งาน Salung มาแล้ว 28 วัน</div>
          <div style={{marginTop:4}}><Tag color={spicy?G:GOLD}>🪙 Zone: สะสม</Tag></div>
        </div>
      </div>
    </Card>
    <Card style={{padding:"4px 14px"}}>
      {items.map((item,i)=>(
        <div key={i}>
          <div onClick={item.action?onSpicyConfirm:undefined}
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"12px 0",cursor:item.action?"pointer":"default"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{item.icon}</span>
              <span style={{fontSize:13,fontWeight:700,color:DARK}}>{item.label}</span>
            </div>
            {item.action
              ?<div style={{width:44,height:24,borderRadius:99,background:spicy?G:"#ddd",
                  border:`2px solid ${DARK}`,position:"relative"}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",
                    border:`1.5px solid ${DARK}`,position:"absolute",top:1,
                    left:spicy?22:2,transition:"left .2s"}}/>
                </div>
              :<span style={{color:"#bbb",fontSize:16}}>›</span>
            }
          </div>
          {i<items.length-1&&<div style={{height:1,background:"#f0f0f0"}}/>}
        </div>
      ))}
    </Card>
  </div>;
}

// ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState("cashflow");
  const [spicy,setSpicy]=useState(false);
  const [spicyConfirm,setSpicyConfirm]=useState(false);

  // ── LIFF state ───────────────────────────────────────────────────────────────
  const [userId,setUserId]=useState(null);
  const [liffProfile,setLiffProfile]=useState(null);
  const [liffReady,setLiffReady]=useState(false);
  const [liffError,setLiffError]=useState(null);

  const WORKER="https://sati-bot.kenwijak2.workers.dev";
  const LIFF_ID_VAL="2010030839-xs1nAvDg";

  useEffect(()=>{
    liff.init({liffId:LIFF_ID_VAL})
      .then(()=>{
        if(!liff.isLoggedIn()){liff.login();return;}
        return liff.getProfile();
      })
      .then(p=>{
        if(p){setLiffProfile(p);setUserId(p.userId);}
        setLiffReady(true);
      })
      .catch(e=>{setLiffError(e.message);setLiffReady(true);});
  },[]);

  async function apiPost(path,body){
    const res=await fetch(WORKER+path,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId,...body}),
    });
    return res.json();
  }

  if(!liffReady)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",background:"#d0d0d0",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid rgba(61,219,90,.2)",borderTopColor:"#3DDB5A",
        borderRadius:"50%",animation:"spin .9s linear infinite"}}/>
      <div style={{fontSize:13,color:"#888"}}>กำลังโหลด Salung 🪙</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  if(liffError)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",background:"#d0d0d0",padding:32,textAlign:"center",gap:10}}>
      <div style={{fontSize:42}}>🪙</div>
      <div style={{fontSize:16,fontWeight:700}}>โหลดไม่ได้</div>
      <div style={{fontSize:12,color:"#888"}}>{liffError}</div>
    </div>
  );


  const bgColor=spicy?"#111":CREAM;
  const headerBg=spicy?DARK:G;

  const screens={
    cashflow:<CashFlow spicy={spicy} apiPost={apiPost} userId={userId}/>,
    save:    <Save     spicy={spicy} apiPost={apiPost} userId={userId}/>,
    debt:    <Debt     spicy={spicy} apiPost={apiPost} userId={userId}/>,
    goal:    <Goal     spicy={spicy} apiPost={apiPost} userId={userId}/>,
    more:    <More     spicy={spicy} onSpicyConfirm={()=>setSpicyConfirm(true)}/>,
  };

  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",minHeight:"100vh",
    background:"#d0d0d0",padding:"16px 0",fontFamily:"'Nunito','Prompt',sans-serif"}}>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:0}`}</style>

    <div style={{width:375,background:bgColor,borderRadius:36,border:"3px solid #222",
      boxShadow:"0 20px 60px rgba(0,0,0,.3)",overflow:"hidden",minHeight:680,
      display:"flex",flexDirection:"column",transition:"background .3s",position:"relative"}}>

      {/* Status bar */}
      <div style={{background:headerBg,height:10,transition:"background .3s"}}/>

      {/* Header */}
      <div style={{background:headerBg,padding:"8px 16px 12px",
        display:"flex",justifyContent:"space-between",alignItems:"center",transition:"background .3s"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,background:spicy?G:DARK,borderRadius:"50%",
            border:`2px solid ${DARK}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>💰</div>
          <span style={{fontSize:18,fontWeight:900,color:spicy?G:DARK}}>Salung</span>
          {spicy&&<Tag color="#FF6B6B">🌶️</Tag>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:11,fontWeight:700,color:spicy?"#aaa":DARK}}>
            {TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.thai}
          </div>
          <button onClick={()=>setSpicyConfirm(true)} style={{display:"flex",alignItems:"center",gap:4,
            padding:"4px 10px",fontSize:11,fontWeight:800,
            background:spicy?"#FF6B6B":(DARK+"22"),color:spicy?"#fff":DARK,
            border:`1.5px solid ${spicy?"#FF6B6B":DARK}`,borderRadius:99,
            cursor:"pointer",transition:"all .2s"}}>
            {spicy?"🌶️ Spicy":"😊 Normal"}
          </button>
        </div>
      </div>

      {/* Spicy confirm modal */}
      {spicyConfirm&&<>
        <div onClick={()=>setSpicyConfirm(false)} style={{position:"absolute",inset:0,
          background:"rgba(0,0,0,.5)",zIndex:998,borderRadius:34}}/>
        <div style={{position:"absolute",bottom:80,left:16,right:16,background:"#fff",
          borderRadius:20,border:`2.5px solid ${DARK}`,boxShadow:`4px 4px 0 ${DARK}`,
          padding:"20px 18px",zIndex:999}}>
          <div style={{fontSize:28,textAlign:"center",marginBottom:8}}>{spicy?"😊":"🌶️"}</div>
          <div style={{fontSize:14,fontWeight:900,color:DARK,textAlign:"center",marginBottom:6}}>
            {spicy?"ปิด Spicy Mode?":"เปิด Spicy Mode?"}
          </div>
          <div style={{fontSize:12,color:"#666",textAlign:"center",lineHeight:1.6,marginBottom:16}}>
            {spicy?"Salung จะกลับมาพูดแบบปกติ ใจดีเหมือนเดิมนะ"
              :"Salung จะพูดตรงๆ กวนนิดหน่อย\nแซะเฉพาะของฟุ่มเฟือย ไม่แซะการออมนะ 😤"}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setSpicyConfirm(false)} style={{flex:1,padding:"11px 0",
              fontSize:13,fontWeight:800,background:"#f5f5f5",color:"#888",
              border:"2px solid #ddd",borderRadius:12,cursor:"pointer"}}>ยกเลิก</button>
            <button onClick={()=>{setSpicy(s=>!s);setSpicyConfirm(false);}} style={{flex:1,
              padding:"11px 0",fontSize:13,fontWeight:900,
              background:spicy?DARK:"#FF6B6B",color:"#fff",
              border:`2px solid ${DARK}`,borderRadius:12,
              boxShadow:`2px 2px 0 ${DARK}`,cursor:"pointer"}}>
              {spicy?"ปิดเลย":"เปิดเลย 🌶️"}
            </button>
          </div>
        </div>
      </>}

      {/* Content */}
      <div style={{flex:1,padding:"10px 14px 14px",overflowY:"auto"}}>{screens[tab]}</div>

      {/* Bottom nav */}
      <div style={{background:spicy?"#1a1a1a":"#fff",borderTop:`2.5px solid ${DARK}`,
        display:"grid",gridTemplateColumns:"repeat(5,1fr)",padding:"5px 0 9px",transition:"background .3s"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",
            cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 2px"}}>
            <div style={{width:30,height:30,borderRadius:9,
              background:tab===t.id?(spicy?G:DARK):"transparent",
              border:tab===t.id?`2px solid ${DARK}`:"2px solid transparent",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,transition:"all .15s",
              boxShadow:tab===t.id?`2px 2px 0 ${DARK}`:"none"}}>
              {t.icon}
            </div>
            <span style={{fontSize:8,fontWeight:800,textAlign:"center",
              color:tab===t.id?(spicy?G:DARK):"#999"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  </div>;
}


// mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
